services:
  - type: web
    name: omr-backend
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y tesseract-ocr tesseract-ocr-tur tesseract-ocr-eng
      pip install -r requirements.txt
      python -c "import easyocr; easyocr.Reader(['tr', 'en'], gpu=False)"
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TESSDATA_PREFIX
        value: /usr/share/tesseract-ocr/5/tessdata
